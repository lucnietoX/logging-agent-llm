version: "3.9"
# ═══════════════════════════════════════════════════════════════
#  Logging Agent LLM — Docker Compose
#
#  Services:
#    database      → PostgreSQL — Prefect Backend
#    server        → Prefect Server UI → http://localhost:4200
#    loki          → Store logs     → http://localhost:3100
#    grafana       → Visualize logs    → http://localhost:3000
#
# ═══════════════════════════════════════════════════════════════
services:
  database:
    image: postgres:15-alpine
    container_name: lla-postgres
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefectpass
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lla-net

  server:
    image: prefecthq/prefect:3-latest
    container_name: lla-prefect
    command: prefect server start
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefectpass@database:5432/prefect
      - PREFECT_SERVER_API_HOST=0.0.0.0
    ports:
      - "4200:4200"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - lla-net

  loki:
    image: grafana/loki:2.9.0
    container_name: lla-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lla-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: lla-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DATASOURCES_DEFAULT_DATASOURCE_URL=http://loki:3100
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - lla-net

volumes:
  postgres_data:
  loki_data:
  grafana_data:
 
networks:
  lla-net:
    driver: bridge